document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ground:#1a1a1a;color:#F5F2EA;font-weight:600;font-size:14px;padding:15px;border-radius:2px;text-decoration:none;letter-spacing:0.02em;\">Solicitar cotización<\u002Fa>\n        <a style=\"display:block;text-align:center;background:transparent;color:#1a1a1a;font-weight:600;font-size:14px;padding:14px;border:1px solid #c9bfa6;border-radius:2px;text-decoration:none;\">Ver trabajos realizados<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;margin-top:22px;border-top:1px solid #ddd5c1;border-bottom:1px solid #ddd5c1;\">\n        <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"3\">\n          <div style=\"flex:1;padding:16px 6px;text-align:center;border-right:1px solid #ddd5c1;\">\n            <div style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:22px;color:#9a7d33;line-height:1;\">{{ st.k }}<\u002Fdiv>\n            <div style=\"font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#8a8266;margin-top:6px;line-height:1.3;\">{{ st.v }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- S3 segments -->\n    <div style=\"padding:14px 22px 34px;\">\n      <div style=\"font-family:'SFMono-Regular',ui-monospace,monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#9a7d33;margin-bottom:14px;\">Para cada ocasión<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#d9d1bd;border:1px solid #d9d1bd;\">\n        <sc-for list=\"{{ segmentos }}\" as=\"seg\" hint-placeholder-count=\"4\">\n          <div style=\"background:#F5F2EA;padding:18px 14px;min-height:118px;\">\n            <div style=\"font-family:'Libre Caslon Text',serif;font-style:italic;font-size:15px;color:#C9A24B;margin-bottom:8px;\">{{ seg.num }}<\u002Fdiv>\n            <div style=\"font-weight:700;font-size:14px;color:#1a1a1a;margin-bottom:6px;line-height:1.2;\">{{ seg.nombre }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;line-height:1.5;color:#6b6552;\">{{ seg.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ornament divider -->\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:10px;padding:0 22px 26px;\">\n      <span style=\"flex:1;height:1px;background:#ddd5c1;\"><\u002Fspan>\n      <span style=\"width:7px;height:7px;background:#C9A24B;transform:rotate(45deg);\"><\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#ddd5c1;\"><\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- S4 featured works -->\n    <div style=\"padding:0 22px 36px;\">\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;\">\n        <h3 style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:24px;color:#1a1a1a;margin:0;line-height:1.1;\">Trabajos<br>realizados<\u002Fh3>\n        <a style=\"font-size:12px;color:#9a7d33;font-weight:600;text-decoration:none;border-bottom:1px solid #C9A24B;padding-bottom:2px;\">Ver todos<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <sc-for list=\"{{ proyectos }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid #e6dec9;\">\n            <div style=\"height:184px;background-color:#e7e1d3;background-image:repeating-linear-gradient(135deg,rgba(26,26,26,0.05) 0 9px,transparent 9px 18px);display:flex;align-items:flex-start;justify-content:flex-end;padding:12px;\">\n              <span style=\"font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#141414;background:#C9A24B;padding:3px 8px;font-weight:700;\">{{ p.segmento }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px;\">\n              <div style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:16px;color:#1a1a1a;\">{{ p.titulo }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#6b6552;margin:3px 0 12px;\">{{ p.ubicacion }}<\u002Fdiv>\n              <div style=\"display:flex;gap:0;border-top:1px solid #ece6d6;\">\n                <div style=\"flex:1;padding:9px 0;text-align:center;border-right:1px solid #ece6d6;\">\n                  <div style=\"font-family:'SFMono-Regular',ui-monospace,monospace;font-size:13px;color:#9a7d33;\">{{ p.m2 }}<\u002Fdiv>\n                  <div style=\"font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;color:#8a8266;margin-top:3px;\">m² cubiertos<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;padding:9px 0;text-align:center;\">\n                  <div style=\"font-family:'SFMono-Regular',ui-monospace,monospace;font-size:13px;color:#9a7d33;\">{{ p.cap }}<\u002Fdiv>\n                  <div style=\"font-size:8.5px;letter-spacing:0.08em;text-transform:uppercase;color:#8a8266;margin-top:3px;\">personas<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- S5 why us -->\n    <div style=\"padding:34px 22px 36px;background:#1a1a1a;color:#F5F2EA;\">\n      <div style=\"font-family:'SFMono-Regular',ui-monospace,monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#C9A24B;margin-bottom:8px;\">Por qué elegirnos<\u002Fdiv>\n      <h3 style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:25px;color:#F5F2EA;margin:0 0 24px;line-height:1.15;\">La confianza se monta antes que la carpa.<\u002Fh3>\n      <div style=\"display:flex;flex-direction:column;gap:0;\">\n        <sc-for list=\"{{ diferenciadores }}\" as=\"d\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;gap:16px;padding:18px 0;border-top:1px solid rgba(201,162,75,0.3);\">\n            <div style=\"font-family:'Libre Caslon Text',serif;font-style:italic;font-size:22px;color:#C9A24B;line-height:1;flex-shrink:0;\">{{ d.num }}<\u002Fdiv>\n            <div>\n              <div style=\"font-weight:700;font-size:15px;margin-bottom:5px;\">{{ d.titulo }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.55;color:#b7b2a2;\">{{ d.texto }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- S6 process -->\n    <div style=\"padding:34px 22px 36px;\">\n      <div style=\"font-family:'SFMono-Regular',ui-monospace,monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#9a7d33;margin-bottom:18px;\">Cómo trabajamos<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;\">\n        <sc-for list=\"{{ pasos }}\" as=\"paso\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;gap:16px;padding-bottom:24px;position:relative;\">\n            <div style=\"flex-shrink:0;width:34px;height:34px;border-radius:50%;border:1px solid #C9A24B;display:flex;align-items:center;justify-content:center;font-family:'Libre Caslon Text',serif;font-size:15px;color:#9a7d33;background:#F5F2EA;z-index:2;\">{{ paso.n }}<\u002Fdiv>\n            <div style=\"padding-top:5px;\">\n              <div style=\"font-weight:700;font-size:14.5px;color:#1a1a1a;margin-bottom:4px;\">{{ paso.titulo }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;line-height:1.5;color:#6b6552;\">{{ paso.texto }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- S7 catalog brief -->\n    <div style=\"padding:6px 22px 36px;\">\n      <div style=\"border:1px solid #d9d1bd;padding:20px;background:#efebe0;\">\n        <div style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:18px;color:#1a1a1a;margin-bottom:6px;\">Catálogo de carpas<\u002Fdiv>\n        <div style=\"font-size:12.5px;line-height:1.55;color:#6b6552;margin-bottom:14px;\">Modelos transparentes, estructurales y pagoda — con medidas y aforo referencial.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;\">\n          <span style=\"font-size:11px;padding:5px 11px;border:1px solid #c9bfa6;color:#54503f;\">Transparente<\u002Fspan>\n          <span style=\"font-size:11px;padding:5px 11px;border:1px solid #c9bfa6;color:#54503f;\">Estructural<\u002Fspan>\n          <span style=\"font-size:11px;padding:5px 11px;border:1px solid #c9bfa6;color:#54503f;\">Pagoda<\u002Fspan>\n          <span style=\"font-size:11px;padding:5px 11px;border:1px solid #c9bfa6;color:#54503f;\">Galpón<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- S8 quote CTA -->\n    <div style=\"padding:34px 22px 36px;background:#efebe0;border-top:1px solid #ddd5c1;\">\n      <h3 style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:25px;color:#1a1a1a;margin:0 0 6px;line-height:1.12;\">Cotiza tu evento<\u002Fh3>\n      <p style=\"font-size:13px;line-height:1.55;color:#6b6552;margin:0 0 20px;\">Cuéntanos lo esencial y te respondemos con una propuesta formal, con factura y detalle de montaje.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:11px;\">\n        <input placeholder=\"Tipo de evento\" style=\"font-family:inherit;font-size:13px;padding:13px;border:1px solid #c9bfa6;background:#F5F2EA;color:#1a1a1a;border-radius:2px;\">\n        <div style=\"display:flex;gap:11px;\">\n          <input placeholder=\"Fecha\" style=\"flex:1;min-width:0;font-family:inherit;font-size:13px;padding:13px;border:1px solid #c9bfa6;background:#F5F2EA;color:#1a1a1a;border-radius:2px;\">\n          <input placeholder=\"N° personas\" style=\"flex:1;min-width:0;font-family:inherit;font-size:13px;padding:13px;border:1px solid #c9bfa6;background:#F5F2EA;color:#1a1a1a;border-radius:2px;\">\n        <\u002Fdiv>\n        <input placeholder=\"Comuna / ubicación\" style=\"font-family:inherit;font-size:13px;padding:13px;border:1px solid #c9bfa6;background:#F5F2EA;color:#1a1a1a;border-radius:2px;\">\n        <input placeholder=\"Tu teléfono o correo\" style=\"font-family:inherit;font-size:13px;padding:13px;border:1px solid #c9bfa6;background:#F5F2EA;color:#1a1a1a;border-radius:2px;\">\n        <a style=\"display:block;text-align:center;background:#1a1a1a;color:#F5F2EA;font-weight:600;font-size:14px;padding:15px;border-radius:2px;text-decoration:none;margin-top:4px;\">Enviar solicitud<\u002Fa>\n        <a style=\"display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:#1a1a1a;font-weight:600;font-size:13px;padding:12px;border:1px solid #c9bfa6;border-radius:2px;text-decoration:none;\">Escríbenos por WhatsApp<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- S9 footer -->\n    <div style=\"padding:30px 22px 34px;background:#1a1a1a;color:#b7b2a2;\">\n      <div style=\"font-family:'Libre Caslon Text',serif;font-weight:700;font-size:17px;color:#F5F2EA;letter-spacing:0.04em;margin-bottom:14px;\">CARPAS LÓPEZ<\u002Fdiv>\n      <div style=\"font-size:12px;line-height:1.9;color:#cfc9b8;\">+56 9 6123 4567<br>contacto@carpaslopez.cl<br>@carpaslopez<\u002Fdiv>\n      <div style=\"font-size:11px;line-height:1.7;color:#7d7868;margin-top:14px;border-top:1px solid rgba(201,162,75,0.25);padding-top:14px;\">Cobertura: Región Metropolitana y V Región · L–V 9:00–18:00<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const segmentos = [\n      { num: '01', nombre: 'Eventos sociales', desc: 'Bodas, cumpleaños, graduaciones y celebraciones en parcela.' },\n      { num: '02', nombre: 'Corporativo', desc: 'Lanzamientos, ferias, activaciones de marca y cenas de gala.' },\n      { num: '03', nombre: 'Público & municipal', desc: 'Fiestas costumbristas, ferias libres y eventos deportivos.' },\n      { num: '04', nombre: 'Industrial', desc: 'Bodegaje temporal, faenas y cobertura de obra.' },\n    ];\n    const proyectos = [\n      { titulo: 'Boda en Viña Santa Cruz', segmento: 'Social', ubicacion: 'Colchagua', m2: '320', cap: '180' },\n      { titulo: 'Expo Regional de Maquinaria', segmento: 'Corporativo', ubicacion: 'Rancagua', m2: '850', cap: '600' },\n      { titulo: 'Fiesta de la Vendimia', segmento: 'Público', ubicacion: 'Curicó', m2: '1.200', cap: '900' },\n    ];\n    const diferenciadores = [\n      { num: '01', titulo: 'Puntualidad de montaje', texto: 'Llegamos antes. El montaje y desmontaje se cumplen en la ventana acordada, sin excepciones.' },\n      { num: '02', titulo: 'Seguridad estructural', texto: 'Anclajes calculados según superficie y carga de viento, con estructuras certificadas.' },\n      { num: '03', titulo: 'Asesoría en terreno', texto: 'Visitamos el lugar antes de cotizar. Cero sorpresas el día del evento.' },\n    ];\n    const pasos = [\n      { n: '1', titulo: 'Asesoría', texto: 'Visita técnica y recomendación según tu espacio.' },\n      { n: '2', titulo: 'Cotización', texto: 'Propuesta formal, con factura y detalle de montaje.' },\n      { n: '3', titulo: 'Montaje', texto: 'Instalación puntual y segura, por equipo propio.' },\n      { n: '4', titulo: 'Evento & desmontaje', texto: 'Soporte durante el evento y retiro coordinado.' },\n    ];\n    const stats = [\n      { k: '+15', v: 'años de experiencia' },\n      { k: '200+', v: 'eventos al año' },\n      { k: 'RM·V', v: 'regiones de cobertura' },\n    ];\n    return { segmentos, proyectos, diferenciadores, pasos, stats };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
